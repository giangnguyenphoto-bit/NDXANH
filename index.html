<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Luxury CRM | Real Estate</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#090A0F] text-[#F3F4F6] antialiased overflow-x-hidden">
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // DỮ LIỆU MẪU
        const MOCK_AGENTS = [
            { phone: "0912345678", name: "Minh Thư", role: "Elite Director", avatar: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=100" },
            { phone: "0987654321", name: "Quốc Huy", role: "Premium Agent", avatar: "https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?auto=format&fit=crop&q=80&w=100" }
        ];

        function App() {
          const [auth, setAuth] = useState({ isAuthenticated: false, user: null });
          const [loginPhone, setLoginPhone] = useState("");

          const handleLogin = (e) => {
            e.preventDefault();
            const foundAgent = MOCK_AGENTS.find(agent => agent.phone === loginPhone);
            if (foundAgent) {
                setAuth({ isAuthenticated: true, user: foundAgent });
            } else {
                alert("Số điện thoại không hợp lệ!");
            }
          };

          if (!auth.isAuthenticated) {
            return (
              <div className="min-h-screen bg-[#090A0F] flex items-center justify-center p-4">
                <div className="max-w-md w-full bg-[#12131C] border border-amber-500/30 rounded-2xl p-8 text-center">
                  <h2 className="text-2xl font-bold text-amber-500 mb-6">ĐĂNG NHẬP HỆ THỐNG</h2>
                  <form onSubmit={handleLogin} className="space-y-4">
                    <input type="tel" value={loginPhone} onChange={(e) => setLoginPhone(e.target.value)} placeholder="Nhập SĐT Agent..." className="w-full p-4 rounded-xl bg-zinc-950 border border-white/10 text-white" required />
                    <button type="submit" className="w-full py-4 bg-amber-600 text-white font-bold rounded-xl uppercase">Truy Cập</button>
                  </form>
                  <p className="mt-4 text-xs text-zinc-500">Dùng: 0912345678 hoặc 0987654321</p>
                </div>
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-[#090A0F] p-10 text-white">
                <h1 className="text-3xl font-bold text-amber-500">Chào mừng {auth.user.name} đã quay trở lại!</h1>
                <p className="mt-4">Hệ thống CRM đã sẵn sàng. Hãy bắt đầu quản lý danh sách khách hàng VIP.</p>
                <button onClick={() => setAuth({isAuthenticated: false, user: null})} className="mt-6 px-4 py-2 bg-red-600 rounded">Đăng Xuất</button>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
