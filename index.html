          },
          {
            id: "CUST-003",
            name: "Nguyễn Lan Hương",

            fengShui: "Đông Tứ Mệnh (Hợp hướng Đông, Nam)",

            notes: "Đặc biệt quan tâm đến tầm nhìn thông thoáng, trần cao tối thiểu 4.2m.",
            timeline: [
              { date: "2026-06-20 11:00", type: "Call", content: "Tư vấn chính sách vay ưu đãi 0% lãi suất trong 24 tháng", operator: "Minh Thư" }
            ]
          }
        ];

        const INITIAL_INVENTORY = [
          { id: "PH-401", floor: "Tầng 40", name: "Grand Marina Penthouse A", type: "Penthouse", area: "450 m2", price: 125000000000, view: "Trực diện Sông Sài Gòn & Quận 1", status: "AVAILABLE", lockExpiry: null },
          { id: "V-102", floor: "Biệt Thự", name: "Regent Beachfront Villa V05", type: "Beach Villa", area: "680 m2", price: 185000000000, view: "Trực diện hoàng hôn Biển Bãi Trường", status: "HOLDING", lockExpiry: Date.now() + 645000 },
          { id: "DP-201", floor: "Tầng 20", name: "The River Duplex Heritage", type: "Duplex", area: "320 m2", price: 78000000000, view: "Bán đảo Thủ Thêm & Cầu Ba Son", status: "SOLD", lockExpiry: null },
          { id: "PH-402", floor: "Tầng 40", name: "Grand Marina Penthouse B", type: "Penthouse", area: "420 m2", price: 118000000000, view: "Sông Sài Gòn & Thảo Cầm Viên", status: "AVAILABLE", lockExpiry: null },
          { id: "V-103", floor: "Biệt Thự", name: "Regent Garden Villa G08", type: "Garden Villa", area: "520 m2", price: 135000000000, view: "Hồ bơi vô cực & Sân vườn nhiệt đới", status: "AVAILABLE", lockExpiry: null },
          { id: "DP-202", floor: "Tầng 20", name: "The River Duplex Signature", type: "Duplex", area: "310 m2", price: 72000000000, view: "Nội khu hồ bơi Lagoon phong cách resort", status: "AVAILABLE", lockExpiry: null }
        ];

        function App() {
          // ==========================================
          // STATE MANAGEMENT
          // ==========================================
          const [activeTab, setActiveTab] = useState("dashboard");
          const [activeDashTab, setActiveDashTab] = useState("ceo");
          const [customers, setCustomers] = useState(INITIAL_CUSTOMERS);
          const [selectedCustId, setSelectedCustId] = useState("CUST-001");
          const [inventory, setInventory] = useState(() => {
            const saved = localStorage.getItem("luxury_real_estate_inventory");
            return saved ? JSON.parse(saved) : INITIAL_INVENTORY;
          });
          const [selectedUnit, setSelectedUnit] = useState(INITIAL_INVENTORY[0]);
          
          const [unlockedContacts, setUnlockedContacts] = useState({});
          const [showIdentityVerify, setShowIdentityVerify] = useState(null);
          const [securityLogs, setSecurityLogs] = useState([
            { timestamp: "2026-07-01 14:00:22", type: "LOGIN", agent: "Minh Thư (Elite Agent)", ip: "192.168.1.105", desc: "Đăng nhập thành công hệ thống CRM Luxury" },
            { timestamp: "2026-07-01 14:05:40", type: "ACCESS", agent: "Minh Thư (Elite Agent)", ip: "192.168.1.105", desc: "Truy cập tệp hồ sơ VIP Bùi Cao Tiến" }
          ]);
          const [watermarkOpacity, setWatermarkOpacity] = useState(6);
          const [systemToast, setSystemToast] = useState(null);

          const [calcScheme, setCalcScheme] = useState("standard");
          const [mortgageLoanPercent, setMortgageLoanPercent] = useState(50);
          const [mortgageTerm, setMortgageTerm] = useState(20);
          const [mortgageInterest, setMortgageInterest] = useState(7.5);
          const [showExportModal, setShowExportModal] = useState(false);

          const [tickets, setTickets] = useState([
            { id: "TKT-101", unitId: "PH-401", category: "Kính xước", desc: "Vết xước nhỏ 5cm góc kính ngoài ban công hướng Đông Nam", status: "fixing", dotX: 180, dotY: 95 },
            { id: "TKT-102", unitId: "V-102", category: "Hệ thống lọc nước", desc: "Van áp lực nước nóng bể sục Jacuzzi ngoài trời bị rò rỉ nhẹ", status: "new", dotX: 280, dotY: 210 },
            { id: "TKT-103", unitId: "DP-201", category: "Sơn tường", desc: "Dặm lại góc sơn phào chỉ chân tường sảnh chính", status: "completed", dotX: 70, dotY: 150 }
          ]);
          const [sketchDot, setSketchDot] = useState(null);
          const [newTicketDesc, setNewTicketDesc] = useState("");
          const [newTicketCategory, setNewTicketCategory] = useState("Kính xước");

          const [vrRotation, setVrRotation] = useState(0);
          const isDraggingVr = useRef(false);
          const startDragX = useRef(0);

          const [clubBookings, setClubBookings] = useState([
            { id: "BK-201", service: "Maybach Chauffeur S650", status: "Confirmed", time: "18:00 - Hôm nay", details: "Đón tỷ phú Bùi Cao Tiến tại Cove Residences đi Park Hyatt." }
          ]);
          const [bookingToast, setBookingToast] = useState("");

          // ==========================================
          // EFFECTS & LOGIC
          // ==========================================
          useEffect(() => {
            let bc;
            try {
              bc = new BroadcastChannel("luxury_estate_locks");
              bc.onmessage = (event) => {
                if (event.data && event.data.type === "UPDATE_INVENTORY") {
                  setInventory(event.data.inventory);
                  showToast("⚡ Cập nhật đồng bộ real-time: Giỏ hàng vừa có thay đổi trạng thái!", "info");
                }
              };
            } catch (e) {
              console.log("BroadcastChannel không khả dụng trên trình duyệt này.");
            }
            return () => { if (bc) bc.close(); };
          }, []);

          const saveAndBroadcastInventory = (newInv) => {
            setInventory(newInv);
            localStorage.setItem("luxury_real_estate_inventory", JSON.stringify(newInv));
            try {
              const bc = new BroadcastChannel("luxury_estate_locks");
              bc.postMessage({ type: "UPDATE_INVENTORY", inventory: newInv });
              bc.close();
            } catch (e) {}
          };

          useEffect(() => {
            const timer = setInterval(() => {
              let changed = false;
              const updated = inventory.map(unit => {
                if (unit.status === "HOLDING" && unit.lockExpiry) {
                  const timeLeft = unit.lockExpiry - Date.now();
                  if (timeLeft <= 0) {
                    changed = true;
                    return { ...unit, status: "AVAILABLE", lockExpiry: null };
                  }
                }
                return unit;
              });
              if (changed) {
                saveAndBroadcastInventory(updated);
                showToast("⏳ Thời gian giữ chỗ của một số căn hộ đã hết hạn. Trạng thái chuyển về Có Sẵn.", "warning");
              }
            }, 1000);
            return () => clearInterval(timer);
          }, [inventory]);

          useEffect(() => {
            const handleRightClick = (e) => {
              e.preventDefault();
              triggerSecurityLog("COPIED_ATTEMPT", "Cố gắng kích hoạt Menu Chuột Phải để sao chép dữ liệu.");
              showToast("🔒 CẢNH BÁO BẢO MẬT: Mọi hành vi sao chép trái phép sẽ bị báo cáo.", "danger");
            };
            const handleCopy = (e) => {
              triggerSecurityLog("COPIED_ATTEMPT", "Cố gắng thực hiện lệnh Sao Chép (Ctrl+C).");
              showToast("🔒 THÔNG BÁO AN NINH: Nghiêm cấm sao chép dữ liệu khách hàng VIP.", "danger");
            };
            window.addEventListener("contextmenu", handleRightClick);
            window.addEventListener("copy", handleCopy);
            return () => {
              window.removeEventListener("contextmenu", handleRightClick);
              window.removeEventListener("copy", handleCopy);
            };
          }, [securityLogs]);

          const triggerSecurityLog = (type, desc) => {
            const newLog = {
              timestamp: new Date().toISOString().replace('T', ' ').substring(0, 19),
              type, agent: "Minh Thư (Elite Agent)", ip: "192.168.1.105", desc
            };
            setSecurityLogs(prev => [newLog, ...prev]);
          };

          const showToast = (message, type = "success") => {
            setSystemToast({ message, type });
            setTimeout(() => setSystemToast(null), 5500);
          };

          const handleRequestUnmask = (custId, field) => setShowIdentityVerify({ custId, field });

          const confirmUnmask = () => {
            if (!showIdentityVerify) return;
            const { custId, field } = showIdentityVerify;
            const targetCust = customers.find(c => c.id === custId);
            
            triggerSecurityLog("UNMASK_SENSITIVE", `Mở khóa thông tin của ${targetCust?.name}. Xác thực FaceID thành công.`);
            setUnlockedContacts(prev => ({ ...prev, [custId]: { ...prev[custId], [field]: true } }));
            showToast(`🔓 Đã mở khóa thông tin thành công.`, "success");
            setShowIdentityVerify(null);
          };

          const formatVND = (number) => new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(number);
          const formatBillion = (number) => (number / 1000000000).toFixed(1) + " Tỷ";

          const handleLockUnit = (unitId) => {
            const updated = inventory.map(unit => {
              if (unit.id === unitId) {
                if (unit.status === "AVAILABLE") return { ...unit, status: "HOLDING", lockExpiry: Date.now() + 15 * 60 * 1000 };
                else if (unit.status === "HOLDING") return { ...unit, status: "AVAILABLE", lockExpiry: null };
              }
              return unit;
            });
            const target = updated.find(u => u.id === unitId);
            triggerSecurityLog("INVENTORY_LOCK", `Đổi trạng thái giữ chỗ căn ${unitId}`);
            saveAndBroadcastInventory(updated);
            setSelectedUnit(target);
            showToast(target.status === "HOLDING" ? `🔐 Đã giữ chỗ tạm thời căn ${unitId}.` : `🔓 Đã giải phóng giữ chỗ căn ${unitId}.`, target.status === "HOLDING" ? "success" : "info");
          };

          const getCalculationSummary = (unit) => {
            if (!unit) return { basePrice: 0, discount: 0, tax: 0, maintenance: 0, netTotal: 0 };
            const basePrice = unit.price;
            let discountPercent = calcScheme === "fast" ? 0.08 : 0;
            const discount = basePrice * discountPercent;
            const discountedPrice = basePrice - discount;
            const tax = discountedPrice * 0.10;
            const maintenance = discountedPrice * 0.02;
            const netTotal = discountedPrice + tax + maintenance;
            return { basePrice, discount, tax, maintenance, netTotal };
          };

          const getAmortizationSchedule = (principal, years, annualRate) => {
            const totalMonths = years * 12;
            const monthlyRate = (annualRate / 100) / 12;
            const principalPerMonth = principal / totalMonths;
            const schedule = [];
            let remainingPrincipal = principal;

            for (let i = 1; i <= Math.min(totalMonths, 360); i++) {
              const interest = remainingPrincipal * monthlyRate;
              const monthlyPayment = principalPerMonth + interest;
              remainingPrincipal -= principalPerMonth;
              if (i === 1 || i % 12 === 0 || i === totalMonths) {
                schedule.push({ month: i, year: Math.ceil(i / 12), principalPay: principalPerMonth, interestPay: interest, totalPay: monthlyPayment, remaining: Math.max(0, remainingPrincipal) });
              }
            }
            return schedule;
          };

          const activeCustomer = customers.find(c => c.id === selectedCustId) || customers[0];
          const summary = getCalculationSummary(selectedUnit);
          const loanAmount = (summary.netTotal * (mortgageLoanPercent / 100));
          const amortization = getAmortizationSchedule(loanAmount, mortgageTerm, mortgageInterest);

          const handleCreateTicket = (e) => {
            e.preventDefault();
            if (!sketchDot) return showToast("📍 Vui lòng nhấp điểm lỗi trên Bản đồ.", "warning");
            if (!newTicketDesc.trim()) return showToast("✍️ Vui lòng điền mô tả.", "warning");

            const newTicket = { id: `TKT-${Math.floor(100 + Math.random() * 900)}`, unitId: selectedUnit?.id || "PH-401", category: newTicketCategory, desc: newTicketDesc, status: "new", dotX: sketchDot.x, dotY: sketchDot.y };
            setTickets(prev => [...prev, newTicket]);
            setNewTicketDesc(""); setSketchDot(null);
            triggerSecurityLog("TICKET_CREATE", `Tạo phiếu sửa chữa ${newTicket.id}`);
            showToast(`✅ Tạo Ticket thành công!`, "success");
          };

          const handleUpdateTicketStatus = (ticketId, nextStatus) => {
            setTickets(prev => prev.map(t => t.id === ticketId ? { ...t, status: nextStatus } : t));
            showToast(`🔄 Cập nhật Ticket thành công.`, "info");
          };

          const handleBookPrivilege = (serviceName) => {
            const newBk = { id: `BK-${Math.floor(200 + Math.random() * 800)}`, service: serviceName, status: "Processing", time: "Hôm nay", details: `Đặt chỗ: ${activeCustomer.name}` };
            setClubBookings(prev => [newBk, ...prev]);
            setBookingToast(`Đã ghi nhận dịch vụ: ${serviceName}`);
            setTimeout(() => setBookingToast(""), 6000);
          };

          // ==========================================
          // RENDER UI MỚI
          // ==========================================
          return (
            <div className="min-h-screen flex flex-col md:flex-row font-sans relative">
              {/* VÂN NƯỚC BẢO MẬT */}
              <div className="fixed inset-0 pointer-events-none z-50 overflow-hidden grid grid-cols-2 md:grid-cols-4 select-none opacity-[var(--wm-opacity)]" style={{ '--wm-opacity': watermarkOpacity / 100 }}>
                {Array.from({ length: 24 }).map((_, i) => (
                  <div key={i} className="text-[10px] md:text-xs text-amber-500/20 transform -rotate-25 whitespace-nowrap p-12 font-mono flex flex-col justify-center items-center">
                    <span>VIP CRM - COFIDENTIAL</span><span>AGENT_ID: MINH THƯ</span>
                  </div>
                ))}
              </div>

              {/* TOAST SYSTEM */}
              {systemToast && (
                <div className="fixed top-6 right-6 z-50 max-w-md animate-bounce">
                  <div className={`p-4 rounded-lg border backdrop-blur-md flex items-start space-x-3 shadow-2xl ${systemToast.type === 'danger' ? 'bg-red-950/80 border-red-500/40 text-red-200' : systemToast.type === 'warning' ? 'bg-amber-950/80 border-amber-500/40 text-amber-200' : 'bg-[#12131C]/90 border-amber-500/30 text-amber-100'}`}>
                    <span className="text-xl">{systemToast.type === 'danger' ? '🚨' : '⚡'}</span>
                    <div>
                      <p className="font-bold text-sm">{systemToast.type === 'danger' ? 'CẢNH BÁO AN NINH' : 'THÔNG BÁO'}</p>
                      <p className="text-xs mt-1">{systemToast.message}</p>
                    </div>
                  </div>
                </div>
              )}

              {/* SIDEBAR */}
              <aside className="hidden md:flex flex-col w-64 bg-[#12131C] border-r border-white/10 p-6 space-y-8 flex-shrink-0 relative z-40">
                <div className="flex items-center space-x-3">
                  <div className="h-10 w-10 rounded-full bg-gradient-to-tr from-amber-600 to-amber-300 flex items-center justify-center text-black text-lg">💎</div>
                  <div>
                    <h2 className="text-sm font-bold text-amber-400">ROYAL REALTY</h2>
                    <p className="text-[10px] text-zinc-400">UHNWIs CRM</p>
                  </div>
                </div>
                <nav className="flex-1 space-y-2">
                  {[
                    { id: "dashboard", label: "Dashboard Chỉ Huy", icon: "📊" },
                    { id: "customers", label: "Khách Hàng 360°", icon: "👤" },
                    { id: "inventory", label: "Sa Bàn Số 3D", icon: "🏢" },
                    { id: "calculator", label: "Bảng Tính Lãi Vay", icon: "🧮" },
                    { id: "handover", label: "Bàn Giao & VIP", icon: "🔑" },
                    { id: "audit", label: "Nhật Ký Bảo Mật", icon: "🛡️" }
                  ].map((menu) => (
                    <button key={menu.id} onClick={() => setActiveTab(menu.id)} className={`w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-sm transition-all ${activeTab === menu.id ? "bg-amber-500/20 text-amber-400 font-bold border-l-2 border-amber-500" : "text-zinc-400 hover:bg-white/5"}`}>
                      <span>{menu.icon}</span><span>{menu.label}</span>
                    </button>
                  ))}
                </nav>
              </aside>

              {/* MAIN CONTENT */}
              <main className="flex-1 flex flex-col min-w-0 relative z-40 h-screen overflow-y-auto">
                <header className="bg-[#12131C]/80 backdrop-blur border-b border-white/10 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
                  <h1 className="text-lg font-bold text-amber-400 tracking-wider">
                    {activeTab === "dashboard" && "DASHBOARD CHỈ HUY"}
                    {activeTab === "customers" && "HỒ SƠ KHÁCH HÀNG 360°"}
                    {activeTab === "inventory" && "SA BÀN SỐ & GIỎ HÀNG"}
                    {activeTab === "calculator" && "BẢNG TÍNH BÁO GIÁ"}
                    {activeTab === "handover" && "QUẢN LÝ BÀN GIAO"}
                    {activeTab === "audit" && "NHẬT KÝ BẢO MẬT"}
                  </h1>
                </header>

                <div className="p-4 md:p-6 space-y-6">
                  
                  {/* TAB: DASHBOARD */}
                  {activeTab === "dashboard" && (
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                      <div className="md:col-span-4 grid grid-cols-2 md:grid-cols-4 gap-4">
                        {[
                          { title: "DOANH SỐ QUÝ", value: "320.5 Tỷ", icon: "📈" },
                          { title: "NPS HÀI LÒNG", value: "98.2%", icon: "🎯" },
                          { title: "TỶ LỆ CHỐT", value: "38.5%", icon: "🔥" },
                          { title: "ĐÃ GIAO DỊCH", value: "42 Căn", icon: "💎" }
                        ].map((s, i) => (
                          <div key={i} className="p-4 rounded-xl bg-[#12131C] border border-white/5 relative overflow-hidden">
                            <p className="text-[10px] text-zinc-400 font-mono">{s.title}</p>
                            <p className="text-xl font-bold text-amber-400 mt-1">{s.value}</p>
                            <span className="absolute top-4 right-4 text-3xl opacity-10">{s.icon}</span>
                          </div>
                        ))}
                      </div>
                      <div className="md:col-span-3 p-5 rounded-xl bg-[#12131C] border border-white/5 h-64 flex flex-col justify-center items-center text-zinc-500">
                         <span className="text-3xl mb-2">📊</span>
                         <p>Biểu đồ Doanh Thu Đang Tải...</p>
                      </div>
                      <div className="md:col-span-1 p-5 rounded-xl bg-[#12131C] border border-white/5 flex flex-col items-center">
                         <div className="w-32 h-32 rounded-full border-8 border-amber-500/20 border-t-amber-500 flex items-center justify-center text-xl font-bold text-amber-400">
                           42/68
                         </div>
                         <p className="text-xs text-zinc-400 mt-4">Tiến độ bán hàng</p>
                      </div>
                    </div>
                  )}

                  {/* TAB: CUSTOMERS */}
                  {activeTab === "customers" && (
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                      <div className="col-span-1 bg-[#12131C] rounded-xl border border-white/10 p-4 space-y-3">
                        <h3 className="text-sm font-bold text-amber-400 mb-2">DANH SÁCH VIP</h3>
                        {customers.map((c) => (
                          <div key={c.id} onClick={() => setSelectedCustId(c.id)} className={`p-4 rounded-xl border cursor-pointer flex items-center space-x-3 ${selectedCustId === c.id ? "bg-amber-500/10 border-amber-500" : "bg-white/5 border-white/10"}`}>
                             <img src={c.avatar} className="w-10 h-10 rounded-full object-cover" />
                             <div>
                               <p className="text-xs font-bold text-white">{c.name}</p>
                               <p className="text-[10px] text-zinc-400">{c.class}</p>
                             </div>
                          </div>
                        ))}
                      </div>
                      <div className="col-span-1 lg:col-span-2 bg-[#12131C] rounded-xl border border-white/10 p-6 space-y-6">
                        <div className="flex justify-between items-center border-b border-white/10 pb-4">
                           <div>
                             <h2 className="text-xl font-bold text-white uppercase">{activeCustomer.name}</h2>
                             <p className="text-xs text-amber-400">{activeCustomer.class} Class • {activeCustomer.id}</p>
                           </div>
                           <div className="text-right">
                             <p className="text-[10px] text-zinc-500">TÀI SẢN RÒNG</p>
                             <p className="font-mono text-amber-400 font-bold">{activeCustomer.netWorth}</p>
                           </div>
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                           <div className="p-4 bg-zinc-950/50 rounded-xl border border-white/5">
                              <p className="text-[10px] text-zinc-500">SỐ ĐIỆN THOẠI</p>
                              <p className="font-mono text-lg text-white my-1">{unlockedContacts[activeCustomer.id]?.phone ? activeCustomer.realPhone : activeCustomer.maskedPhone}</p>
                              {!unlockedContacts[activeCustomer.id]?.phone && <button onClick={() => handleRequestUnmask(activeCustomer.id, 'phone')} className="text-xs text-amber-400 border border-amber-400/30 px-2 py-1 rounded mt-2">👁️ Mở Khóa</button>}
                           </div>
                           <div className="p-4 bg-zinc-950/50 rounded-xl border border-white/5">
                              <p className="text-[10px] text-zinc-500">EMAIL RIÊNG TƯ</p>
                              <p className="font-mono text-lg text-white my-1">{unlockedContacts[activeCustomer.id]?.email ? activeCustomer.realEmail : activeCustomer.maskedEmail}</p>
                              {!unlockedContacts[activeCustomer.id]?.email && <button onClick={() => handleRequestUnmask(activeCustomer.id, 'email')} className="text-xs text-amber-400 border border-amber-400/30 px-2 py-1 rounded mt-2">👁️ Mở Khóa</button>}
                           </div>
                        </div>
                        <div className="p-4 bg-amber-500/5 border border-amber-500/20 rounded-xl">
                          <p className="text-xs font-bold text-amber-400 mb-1">GHI CHÚ CHĂM SÓC</p>
                          <p className="text-sm text-zinc-300 italic">{activeCustomer.notes}</p>
                        </div>
                      </div>
                    </div>
                  )}

                  {/* TAB: INVENTORY */}
                  {activeTab === "inventory" && (
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                      <div className="lg:col-span-2 grid grid-cols-1 sm:grid-cols-2 gap-4">
                         {inventory.map((u) => (
                           <div key={u.id} onClick={() => setSelectedUnit(u)} className={`p-4 rounded-xl border cursor-pointer relative ${selectedUnit?.id === u.id ? 'ring-2 ring-amber-500' : ''} ${u.status === 'SOLD' ? 'bg-red-950/20 border-red-500/30' : u.status === 'HOLDING' ? 'bg-amber-950/20 border-amber-500/30 animate-pulse' : 'bg-emerald-950/20 border-emerald-500/30'}`}>
                              <span className="absolute top-2 right-2 text-[9px] px-2 py-1 bg-black/50 rounded text-white">{u.status}</span>
                              <p className="text-xs text-zinc-400">{u.floor}</p>
                              <p className="font-bold text-white mt-1">{u.name}</p>
                              <p className="text-amber-400 font-mono text-sm mt-2">{formatBillion(u.price)}</p>
                           </div>
                         ))}
                      </div>
                      <div className="lg:col-span-1 bg-[#12131C] rounded-xl border border-white/10 p-5 space-y-4">
                         <h3 className="font-bold text-white">{selectedUnit.name}</h3>
                         <div className="space-y-2 text-sm text-zinc-400">
                           <p>Diện tích: <span className="text-white">{selectedUnit.area}</span></p>
                           <p>View: <span className="text-white">{selectedUnit.view}</span></p>
                           <p>Giá gốc: <span className="text-amber-400">{formatVND(selectedUnit.price)}</span></p>
                         </div>
                         <button onClick={() => handleLockUnit(selectedUnit.id)} disabled={selectedUnit.status === 'SOLD'} className={`w-full py-3 rounded-lg font-bold text-xs uppercase ${selectedUnit.status === 'SOLD' ? 'bg-red-900 text-zinc-400' : selectedUnit.status === 'HOLDING' ? 'bg-amber-600 text-white' : 'bg-emerald-600 text-white'}`}>
                            {selectedUnit.status === 'HOLDING' ? '🔓 HỦY GIỮ CHỖ' : selectedUnit.status === 'SOLD' ? '🔒 ĐÃ BÁN' : '🔐 KHÓA GIỮ CHỖ 15P'}
                         </button>
                      </div>
                    </div>
                  )}

                  {/* TAB: CALCULATOR & OTHERS (Rút gọn để hiển thị cấu trúc cơ bản) */}
                  {(activeTab === "calculator" || activeTab === "handover" || activeTab === "audit") && (
                     <div className="p-10 text-center bg-[#12131C] rounded-xl border border-white/10">
                        <p className="text-amber-400 text-xl font-bold mb-2">⚙️ Module {activeTab.toUpperCase()} đang hoạt động</p>
                        <p className="text-zinc-400">Phần giao diện động đã được nạp thành công vào hệ thống. Chức năng tính toán và tạo Ticket lưu trong bộ nhớ.</p>
                     </div>
                  )}

                </div>
              </main>

              {/* MOBILE BOTTOM NAV */}
              <nav className="md:hidden fixed bottom-0 left-0 right-0 bg-[#12131C] border-t border-white/10 p-2 flex justify-around z-50">
                 {["dashboard", "customers", "inventory", "calculator"].map(menu => (
                   <button key={menu} onClick={() => setActiveTab(menu)} className={`text-[10px] uppercase font-bold p-2 ${activeTab === menu ? 'text-amber-400' : 'text-zinc-500'}`}>
                      {menu}
                   </button>
                 ))}
              </nav>

              {/* MODAL XÁC NHẬN FACEID */}
              {showIdentityVerify && (
                <div className="fixed inset-0 z-[60] bg-black/80 flex items-center justify-center p-4">
                  <div className="bg-[#12131C] border border-amber-500 rounded-xl p-6 max-w-sm w-full text-center">
                    <p className="text-4xl mb-2">🔐</p>
                    <p className="text-amber-400 font-bold mb-4">XÁC THỰC FACEID</p>
                    <p className="text-xs text-zinc-400 mb-6">Yêu cầu truy cập dữ liệu mật của khách hàng.</p>
                    <div className="flex gap-2">
                       <button onClick={() => setShowIdentityVerify(null)} className="flex-1 py-2 border border-white/20 rounded text-zinc-300 text-sm">Hủy</button>
                       <button onClick={confirmUnmask} className="flex-1 py-2 bg-amber-500 text-black font-bold rounded text-sm">Xác Nhận</button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
