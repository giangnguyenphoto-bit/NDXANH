<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Luxury CRM | Real Estate</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#090A0F] text-[#F3F4F6] antialiased selection:bg-amber-500/30">
    
    <div id="root"></div>

    <!-- HỆ THỐNG BẮT LỖI MÀN HÌNH ĐEN -->
    <script>
        setTimeout(function() {
            var root = document.getElementById('root');
            if (!root.innerHTML.trim()) {
                root.innerHTML = '<div style="color:#F59E0B; text-align:center; padding: 50px; font-family: monospace; line-height: 1.8; border: 1px solid #D4AF37; margin: 20px; border-radius: 10px; background: #12131C;"><h2>🚨 CẢNH BÁO BẢO MẬT: REACT KHÔNG THỂ KHỞI ĐỘNG</h2><p>Màn hình đen là do trình duyệt không thể dịch được mã lệnh React.<br/>Nguyên nhân 99% là do Copy/Paste bị thiếu ký tự ở đầu hoặc cuối file.<br/><br/>Hãy quay lại GitHub, nhấn Ctrl+A (chọn tất cả) và dán đè mã mới một lần nữa nhé!</p></div>';
            }
        }, 2000);
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // MOCK DATA & CẤU HÌNH NHÂN SỰ
        // ==========================================
        const MOCK_AGENTS = [
            { phone: "0912345678", name: "Minh Thư", role: "Elite Director", avatar: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=100" },
            { phone: "0987654321", name: "Quốc Huy", role: "Premium Agent", avatar: "https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?auto=format&fit=crop&q=80&w=100" }
        ];

        const INITIAL_CUSTOMERS = [
          {
            id: "CUST-001",
            name: "Bùi Cao Tiến",
            vipClass: "Diamond",
            maskedPhone: "091***789",
            realPhone: "0912345789",
            maskedEmail: "t***b@royalvn.com",
            realEmail: "tiencb@royalvn.com",
            avatar: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&q=80&w=120",
            architecture: "Indochine (Đông Dương cổ điển)",
            fengShui: "Đông Tứ Mệnh",
            hobbies: ["Chơi Golf PGA", "Du thuyền Yacht Club"],
            netWorth: "Ước tính > 500 Tỷ VNĐ",
            address: "Penthouse Cove Residences, Empire City",
            notes: "Ưu tiên căn có bến đỗ du thuyền trực diện sông Sài Gòn.",
            timeline: [{ date: "2026-06-28 09:30", type: "Call", content: "Agent Minh Thư gọi điện tư vấn giỏ hàng", operator: "Minh Thư" }]
          },
          {
            id: "CUST-002",
            name: "Phạm Minh Hoàng",
            vipClass: "Royal",
            maskedPhone: "090***666",
            realPhone: "0909666888",
            maskedEmail: "h***m@vnluxury.com",
            realEmail: "hoangpm@vnluxury.com",
            avatar: "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&q=80&w=120",
            architecture: "Minimalism (Tối giản thượng lưu)",
            fengShui: "Tây Tứ Mệnh",
            hobbies: ["Sưu tầm rượu vang", "Lái xe cổ Maybach"],
            netWorth: "Ước tính > 1.200 Tỷ VNĐ",
            address: "Biệt thự Chateau, Phú Mỹ Hưng, Quận 7",
            notes: "Yêu cầu phòng hầm rượu riêng biệt rộng tối thiểu 50m2.",
            timeline: [{ date: "2026-06-25 10:15", type: "Zalo/Viber", content: "Gửi sơ đồ mặt bằng", operator: "Quốc Huy" }]
          }
        ];

        const INITIAL_INVENTORY = [
          { id: "PH-401", floor: "Tầng 40", name: "Grand Marina Penthouse", type: "Penthouse", area: "450 m2", price: 125000000000, view: "Trực diện Sông Sài Gòn", status: "AVAILABLE", lockExpiry: null },
          { id: "V-102", floor: "Biệt Thự", name: "Regent Beachfront Villa", type: "Beach Villa", area: "680 m2", price: 185000000000, view: "Mặt Biển", status: "HOLDING", lockExpiry: Date.now() + 645000 },
          { id: "SH-105", floor: "Tầng Trệt", name: "The Global City Shophouse", type: "Shophouse", area: "120 m2", price: 45000000000, view: "Phố thương mại", status: "AVAILABLE", lockExpiry: null }
        ];

        function App() {
          const [auth, setAuth] = useState({ isAuthenticated: false, user: null });
          const [loginPhone, setLoginPhone] = useState("");
          const [loginError, setLoginError] = useState("");

          const [activeTab, setActiveTab] = useState("customers");
          const [customers, setCustomers] = useState(INITIAL_CUSTOMERS);
          const [selectedCustId, setSelectedCustId] = useState(INITIAL_CUSTOMERS[0].id);
          const [inventory, setInventory] = useState(INITIAL_INVENTORY);
          const [unlockedContacts, setUnlockedContacts] = useState({});
          
          const [showCustForm, setShowCustForm] = useState(false);
          const [editingCust, setEditingCust] = useState(null);
          const [formData, setFormData] = useState({
            name: "", realPhone: "", realEmail: "", vipClass: "Gold", architecture: "", fengShui: "", netWorth: "", address: "", notes: "", hobbies: ""
          });

          const handleLogin = (e) => {
            e.preventDefault();
            const foundAgent = MOCK_AGENTS.find(agent => agent.phone === loginPhone);
            if (foundAgent) {
                setAuth({ isAuthenticated: true, user: foundAgent });
                setLoginError("");
            } else {
                setLoginError("Số điện thoại không tồn tại hoặc không có quyền truy cập.");
            }
          };

          const handleLogout = () => {
            setAuth({ isAuthenticated: false, user: null });
            setLoginPhone("");
          };

          const openCustForm = (cust = null) => {
            if (cust) {
                setEditingCust(cust);
                setFormData({
                    name: cust.name || "", 
                    realPhone: cust.realPhone || "", 
                    realEmail: cust.realEmail || "", 
                    vipClass: cust.vipClass || "Gold", 
                    architecture: cust.architecture || "", 
                    fengShui: cust.fengShui || "", 
                    netWorth: cust.netWorth || "", 
                    address: cust.address || "", 
                    notes: cust.notes || "", 
                    hobbies: (cust.hobbies || []).join(", ")
                });
            } else {
                setEditingCust(null);
                setFormData({
                    name: "", realPhone: "", realEmail: "", vipClass: "Gold", architecture: "", fengShui: "", netWorth: "", address: "", notes: "", hobbies: ""
                });
            }
            setShowCustForm(true);
          };

          const handleSaveCustomer = (e) => {
            e.preventDefault();
            
            const phone = formData.realPhone || "";
            const maskedPhone = phone.length >= 7 ? `${phone.substring(0,3)}***${phone.substring(phone.length - 3)}` : phone;
            
            const email = formData.realEmail || "";
            const emailParts = email.split("@");
            const maskedEmail = emailParts.length === 2 && emailParts[0].length > 2 
                ? `${emailParts[0].charAt(0)}***${emailParts[0].charAt(emailParts[0].length-1)}@${emailParts[1]}` 
                : email;

            const hobbiesArray = (formData.hobbies || "").split(",").map(h => h.trim()).filter(h => h);

            const newCustData = {
                id: editingCust ? editingCust.id : `CUST-00${customers.length + 1}`,
                name: formData.name,
                vipClass: formData.vipClass,
                realPhone: phone,
                maskedPhone: maskedPhone,
                realEmail: email,
                maskedEmail: maskedEmail,
                architecture: formData.architecture,
                fengShui: formData.fengShui,
                netWorth: formData.netWorth,
                address: formData.address,
                notes: formData.notes,
                hobbies: hobbiesArray,
                avatar: editingCust ? editingCust.avatar : "https://images.unsplash.com/photo-1560250097-0b93528c311a?auto=format&fit=crop&q=80&w=120",
                timeline: editingCust ? editingCust.timeline : [{ date: new Date().toISOString().substring(0,16).replace("T"," "), type: "System", content: `Khởi tạo hồ sơ bởi Agent`, operator: "System" }]
            };

            if (editingCust) {
                setCustomers(customers.map(c => c.id === editingCust.id ? newCustData : c));
            } else {
                setCustomers([newCustData, ...customers]);
                setSelectedCustId(newCustData.id);
            }
            
            setShowCustForm(false);
          };

          const formatBillion = (number) => (number / 1000000000).toFixed(1) + " Tỷ";
          const activeCustomer = customers.find(c => c.id === selectedCustId) || customers[0];

          if (!auth.isAuthenticated) {
            return (
              <div className="min-h-screen bg-[#090A0F] flex items-center justify-center p-4 relative overflow-hidden">
                <div className="absolute inset-0 pointer-events-none opacity-20" style={{ backgroundImage: 'radial-gradient(#D4AF37 1px, transparent 1px)', backgroundSize: '40px 40px' }}></div>
                
                <div className="max-w-md w-full bg-[#12131C]/90 backdrop-blur-xl border border-amber-500/30 rounded-2xl p-8 space-y-8 shadow-2xl relative z-10">
                  <div className="absolute top-0 left-0 right-0 h-1.5 bg-gradient-to-r from-amber-500 via-yellow-400 to-amber-600"></div>
                  
                  <div className="text-center space-y-3">
                    <div className="h-20 w-20 mx-auto rounded-full bg-gradient-to-tr from-amber-600 to-amber-300 flex items-center justify-center shadow-lg shadow-amber-500/20 mb-6 border-4 border-[#090A0F]">
                      <span className="text-4xl">💎</span>
                    </div>
                    <h2 className="text-2xl font-bold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-amber-400 via-yellow-200 to-amber-500">ROYAL REALTY</h2>
                    <p className="text-xs text-zinc-400 font-mono tracking-widest">HỆ THỐNG ĐĂNG NHẬP NỘI BỘ</p>
                  </div>

                  <form onSubmit={handleLogin} className="space-y-6 mt-8">
                    <div>
                      <label className="text-xs text-zinc-400 font-mono uppercase block mb-2">Số điện thoại Định danh</label>
                      <input 
                        type="tel" 
                        value={loginPhone} 
                        onChange={(e) => setLoginPhone(e.target.value)} 
                        placeholder="Nhập SĐT Agent..." 
                        className="w-full p-4 rounded-xl bg-zinc-950/50 border border-white/10 text-white focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-all font-mono" 
                        required 
                      />
                    </div>
                    
                    {loginError && <p className="text-xs text-red-400 font-mono bg-red-500/10 p-3 rounded-lg border border-red-500/20">{loginError}</p>}
                    
                    <button type="submit" className="w-full py-4 bg-gradient-to-r from-amber-500 to-amber-600 hover:from-amber-600 hover:to-amber-700 text-black font-bold rounded-xl text-sm tracking-widest uppercase shadow-lg shadow-amber-500/20 transition-all duration-300">
                      Truy Cập Không Gian VIP
                    </button>
                  </form>

                  <div className="pt-6 border-t border-white/5 text-[10px] text-zinc-500 text-center font-mono space-y-1.5">
                      <p>Danh sách SĐT Demo (Bấm để copy):</p>
                      <p className="text-amber-500/70 cursor-pointer hover:text-amber-400" onClick={() => setLoginPhone("0912345678")}>0912345678 (Minh Thư - Director)</p>
                      <p className="text-amber-500/70 cursor-pointer hover:text-amber-400" onClick={() => setLoginPhone("0987654321")}>0987654321 (Quốc Huy - Agent)</p>
                  </div>
                </div>
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-[#090A0F] text-[#F3F4F6] font-sans flex flex-col md:flex-row">
                
                <aside className="hidden md:flex flex-col w-64 bg-[#12131C] border-r border-white/10 p-6 space-y-8 flex-shrink-0">
                    <div className="flex items-center space-x-3">
                        <div className="h-10 w-10 rounded-full bg-gradient-to-tr from-amber-600 to-amber-300 flex items-center justify-center">
                            <span className="text-lg">💎</span>
                        </div>
                        <div>
                            <h2 className="text-sm font-bold tracking-widest text-amber-400">ROYAL REALTY</h2>
                            <p className="text-[10px] text-zinc-400 font-mono">UHNWIs CRM Portal</p>
                        </div>
                    </div>

                    <div className="p-4 rounded-lg bg-white/5 border border-white/10 flex items-center justify-between">
                        <div className="flex items-center space-x-3">
                            <img src={auth.user.avatar} alt="Agent" className="h-10 w-10 rounded-full object-cover border border-amber-400/50" />
                            <div>
                                <p className="text-xs font-bold text-amber-400">{auth.user.name}</p>
                                <span className="text-[9px] text-zinc-400">{auth.user.role}</span>
                            </div>
                        </div>
                    </div>

                    <nav className="flex-1 space-y-2">
                        <button onClick={() => setActiveTab("customers")} className={`w-full text-left px-4 py-3 rounded-lg text-sm transition-all ${activeTab === "customers" ? "bg-amber-500/10 text-amber-400 border-l-2 border-amber-500 font-bold" : "text-zinc-400 hover:bg-white/5"}`}>👤 Khách Hàng 360°</button>
                        <button onClick={() => setActiveTab("inventory")} className={`w-full text-left px-4 py-3 rounded-lg text-sm transition-all ${activeTab === "inventory" ? "bg-amber-500/10 text-amber-400 border-l-2 border-amber-500 font-bold" : "text-zinc-400 hover:bg-white/5"}`}>🏢 Sa Bàn Số 3D</button>
                    </nav>

                    <button onClick={handleLogout} className="text-xs text-red-400 hover:text-red-300 font-mono text-left border-t border-white/10 pt-4">⎋ Đăng Xuất An Toàn</button>
                </aside>

                <main className="flex-1 p-4 md:p-6 overflow-y-auto">
                    
                    {activeTab === "customers" && (
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            
                            <div className="col-span-1 bg-[#12131C] rounded-xl border border-white/10 p-4 space-y-4">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-sm font-bold tracking-widest text-amber-400">TỆP KHÁCH VIP</h3>
                                    <button onClick={() => openCustForm()} className="px-3 py-1.5 bg-amber-500/20 hover:bg-amber-500/30 text-amber-400 border border-amber-500/30 rounded text-xs font-bold transition-all">
                                        + THÊM MỚI
                                    </button>
                                </div>
                                
                                <div className="space-y-3">
                                    {customers.map((cust) => (
                                        <div key={cust.id} onClick={() => setSelectedCustId(cust.id)} className={`p-4 rounded-xl border cursor-pointer transition-all flex items-center justify-between ${selectedCustId === cust.id ? "bg-amber-500/10 border-amber-500" : "bg-white/5 border-white/10 hover:border-white/25"}`}>
                                            <div className="flex items-center space-x-3">
                                                <img src={cust.avatar} alt={cust.name} className="h-10 w-10 rounded-full border border-amber-400/50 object-cover" />
                                                <div>
                                                    <h4 className="text-xs font-bold text-zinc-100">{cust.name}</h4>
                                                    <p className="text-[9px] text-zinc-400 mt-0.5">{cust.vipClass}</p>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="col-span-1 lg:col-span-2 bg-[#12131C] rounded-xl border border-white/10 p-6">
                                {activeCustomer && (
                                    <div className="space-y-6">
                                        <div className="flex justify-between items-start border-b border-white/10 pb-4">
                                            <div>
                                                <h3 className="text-xl font-bold text-zinc-100 uppercase">{activeCustomer.name}</h3>
                                                <p className="text-xs text-amber-400 font-mono mt-1">Hạng: {activeCustomer.vipClass} | ID: {activeCustomer.id}</p>
                                            </div>
                                            <button onClick={() => openCustForm(activeCustomer)} className="px-4 py-2 bg-white/5 hover:bg-white/10 border border-white/10 rounded-lg text-xs text-zinc-300 transition-all">
                                                ✏️ Chỉnh Sửa Hồ Sơ
                                            </button>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div className="p-4 rounded-xl bg-zinc-950/50 border border-white/5">
                                                <p className="text-[10px] text-zinc-500 uppercase font-mono">Điện Thoại</p>
                                                <div className="flex justify-between items-center mt-1">
                                                    <p className="text-sm font-bold text-zinc-200">{unlockedContacts[activeCustomer.id] ? activeCustomer.realPhone : activeCustomer.maskedPhone}</p>
                                                    {!unlockedContacts[activeCustomer.id] && (
                                                        <button onClick={() => setUnlockedContacts({...unlockedContacts, [activeCustomer.id]: true})} className="text-[9px] px-2 py-1 bg-amber-500/10 text-amber-400 border border-amber-500/20 rounded uppercase font-bold">Mở Khóa</button>
                                                    )}
                                                </div>
                                            </div>
                                            <div className="p-4 rounded-xl bg-zinc-950/50 border border-white/5">
                                                <p className="text-[10px] text-zinc-500 uppercase font-mono">Email</p>
                                                <p className="text-sm font-bold text-zinc-200 mt-1">{activeCustomer.maskedEmail}</p>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6 border-t border-white/10 pt-6">
                                            <div>
                                                <h4 className="text-[10px] font-bold text-amber-400 uppercase">Tài sản ước tính</h4>
                                                <p className="text-xs text-zinc-300 font-semibold mt-1">{activeCustomer.netWorth}</p>
                                            </div>
                                            <div>
                                                <h4 className="text-[10px] font-bold text-amber-400 uppercase">Gu Kiến Trúc</h4>
                                                <p className="text-xs text-zinc-300 font-semibold mt-1">{activeCustomer.architecture}</p>
                                            </div>
                                            <div>
                                                <h4 className="text-[10px] font-bold text-amber-400 uppercase">Phong Thủy</h4>
                                                <p className="text-xs text-zinc-300 font-semibold mt-1">{activeCustomer.fengShui}</p>
                                            </div>
                                            <div className="md:col-span-3">
                                                <h4 className="text-[10px] font-bold text-amber-400 uppercase">Địa chỉ</h4>
                                                <p className="text-xs text-zinc-300 mt-1">{activeCustomer.address}</p>
                                            </div>
                                            <div className="md:col-span-3">
                                                <h4 className="text-[10px] font-bold text-amber-400 uppercase">Sở Thích</h4>
                                                <div className="flex gap-2 mt-2 flex-wrap">
                                                    {(activeCustomer.hobbies || []).map((hb, i) => (
                                                        <span key={i} className="px-2.5 py-1 text-[10px] rounded bg-white/5 border border-white/10 text-zinc-300">{hb}</span>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>

                                        <div className="p-4 rounded-xl bg-amber-500/5 border border-amber-500/20">
                                            <h4 className="text-[10px] font-bold text-amber-400 uppercase">Ghi chú đặc biệt</h4>
                                            <p className="text-xs text-zinc-300 italic mt-1">{activeCustomer.notes}</p>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {activeTab === "inventory" && (
                        <div className="bg-[#12131C] rounded-xl border border-white/10 p-6 space-y-4">
                            <h3 className="text-sm font-bold tracking-widest text-amber-400 mb-4">SA BÀN SỐ & GIỎ HÀNG 3D</h3>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                {inventory.map((unit) => (
                                    <div key={unit.id} className={`p-4 rounded-xl border ${unit.status === 'HOLDING' ? 'bg-[#F59E0B]/10 border-[#F59E0B]/40' : 'bg-[#10B981]/10 border-[#10B981]/40'}`}>
                                        <div className="flex justify-between items-start">
                                            <span className="text-[9px] px-1.5 py-0.5 rounded bg-black/40 font-mono tracking-wider text-white font-bold">{unit.status}</span>
                                            <p className="text-[10px] text-zinc-400 font-mono">{unit.floor}</p>
                                        </div>
                                        <h4 className="text-xs font-bold text-white mt-2">{unit.name}</h4>
                                        <div className="flex justify-between items-center mt-3 text-xs border-t border-white/5 pt-2">
                                            <span className="font-mono text-amber-400 font-bold">{formatBillion(unit.price)}</span>
                                            <span className="text-zinc-400 text-[10px] font-mono">{unit.area}</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </main>
                
                {showCustForm && (
                    <div className="fixed inset-0 z-50 bg-[#000000]/80 backdrop-blur-md flex items-center justify-center p-4">
                        <div className="bg-[#12131C] border border-amber-500/40 max-w-2xl w-full rounded-2xl p-6 shadow-2xl relative overflow-y-auto max-h-[90vh]">
                            <div className="flex justify-between items-center border-b border-white/10 pb-4 mb-4">
                                <h3 className="text-lg font-bold text-amber-400 uppercase">{editingCust ? "CẬP NHẬT HỒ SƠ VIP" : "THÊM KHÁCH HÀNG MỚI"}</h3>
                                <button onClick={() => setShowCustForm(false)} className="text-zinc-500 hover:text-white text-xl">✕</button>
                            </div>
                            
                            <form onSubmit={handleSaveCustomer} className="space-y-4">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div>
                                        <label className="text-[10px] text-zinc-400 uppercase font-bold block mb-1">Họ Tên Khách Hàng *</label>
                                        <input type="text" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full p-2.5 rounded bg-zinc-900 border border-white/10 text-sm text-white focus:border-amber-500" required />
                                    </div>
                                    <div>
                                        <label className="text-[10px] text-zinc-400 uppercase font-bold block mb-1">Phân Hạng VIP</label>
                                        <select value={formData.vipClass} onChange={e => setFormData({...formData, vipClass: e.target.value})} className="w-full p-2.5 rounded bg-zinc-900 border border-white/10 text-sm text-white focus:border-amber-500">
                                            <option value="Gold">Gold (Trên 50 Tỷ)</option>
                                            <option value="Platinum">Platinum (Trên 100 Tỷ)</option>
                                            <option value="Diamond">Diamond (Trên 500 Tỷ)</option>
                                            <option value="Royal">Royal (Trên 1000 Tỷ)</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="text-[10px] text-zinc-400 uppercase font-bold block mb-1">Số Điện Thoại *</label>
                                        <input type="tel" value={formData.realPhone} onChange={e => setFormData({...formData, realPhone: e.target.value})} className="w-full p-2.5 rounded bg-zinc-900 border border-white/10 text-sm text-white focus:border-amber-500" required />
                                    </div>
                                    <div>
                                        <label className="text-[10px] text-zinc-400 uppercase font-bold block mb-1">Email Riêng Tư *</label>
                                        <input type="email" value={formData.realEmail} onChange={e => setFormData({...formData, realEmail: e.target.value})} className="w-full p-2.5 rounded bg-zinc-900 border border-white/10 text-sm text-white focus:border-amber-500" required />
                                    </div>
                                    <div className="md:col-span-2">
                                        <label className="text-[10px] text-zinc-400 uppercase font-bold block mb-1">Địa Chỉ Lưu Trú Chính</label>
                                        <input type="text" value={formData.address} onChange={e => setFormData({...formData, address: e.target.value})} className="w-full p-2.5 rounded bg-zinc-900 border border-white/10 text-sm text-white focus:border-amber-500" />
                                    </div>
                                    <div>
                                        <label className="text-[10px] text-zinc-400 uppercase font-bold block mb-1">Gu Kiến Trúc</label>
                                        <input type="text" value={formData.architecture} onChange={e => setFormData({...formData, architecture: e.target.value})} placeholder="VD: Tân cổ điển, Indochine..." className="w-full p-2.5 rounded bg-zinc-900 border border-white/10 text-sm text-white focus:border-amber-500" />
                                    </div>
                                    <div>
                                        <label className="text-[10px] text-zinc-400 uppercase font-bold block mb-1">Phong Thủy</label>
                                        <input type="text" value={formData.fengShui} onChange={e => setFormData({...formData, fengShui: e.target.value})} placeholder="VD: Đông Tứ Mệnh..." className="w-full p-2.5 rounded bg-zinc-900 border border-white/10 text-sm text-white focus:border-amber-500" />
                                    </div>
                                    <div className="md:col-span-2">
                                        <label className="text-[10px] text-zinc-400 uppercase font-bold block mb-1">Sở Thích (Cách nhau bằng dấu phẩy)</label>
                                        <input type="text" value={formData.hobbies} onChange={e => setFormData({...formData, hobbies: e.target.value})} placeholder="VD: Đánh Golf, Sưu tầm rượu..." className="w-full p-2.5 rounded bg-zinc-900 border border-white/10 text-sm text-white focus:border-amber-500" />
                                    </div>
                                    <div className="md:col-span-2">
                                        <label className="text-[10px] text-zinc-400 uppercase font-bold block mb-1">Ghi Chú Đặt Biệt Tới Kỹ Thuật / Bán Hàng</label>
                                        <textarea value={formData.notes} onChange={e => setFormData({...formData, notes: e.target.value})} rows="3" className="w-full p-2.5 rounded bg-zinc-900 border border-white/10 text-sm text-white focus:border-amber-500"></textarea>
                                    </div>
                                </div>
                                <div className="flex justify-end space-x-3 pt-4 border-t border-white/10">
                                    <button type="button" onClick={() => setShowCustForm(false)} className="px-5 py-2.5 rounded-lg border border-white/10 text-zinc-300 text-xs font-bold hover:bg-white/5">Hủy Bỏ</button>
                                    <button type="submit" className="px-5 py-2.5 rounded-lg bg-gradient-to-r from-amber-500 to-amber-600 text-black text-xs font-bold shadow-lg shadow-amber-500/20">
                                        {editingCust ? "Lưu Cập Nhật" : "Tạo Mới Hồ Sơ"}
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                )}

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
